name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: palrang22/PRReviewer@v2
        with:
          anthropic-key: ${{ secrets.ANTHROPIC_API_KEY }}
